name: chaotic click sequence
firmware: 100-button_led_cycle
description: Test chaotic sequence of mixed click types and timings
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 150, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 150, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 550, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 550, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 700, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 750, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 750, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1300, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1600, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2000, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2000, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 2500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2550, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2550, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
