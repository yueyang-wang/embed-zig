name: repeated press_down without release
firmware: 100-button_led_cycle
description: Repeated press_down events are ignored; only first sets press_start_t
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 150, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 200, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 400, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 450, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 700, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 750, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1100, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1100, dev: "led0", v: { on: true, r: 255, g: 255, b: 255 } }
