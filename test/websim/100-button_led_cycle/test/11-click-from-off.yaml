name: click from off state directly
firmware: 100-button_led_cycle
description: Test clicking when LED is OFF (click should turn on with color)
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 160, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 160, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
