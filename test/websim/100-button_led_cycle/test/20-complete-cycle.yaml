name: complete cycle integration test
firmware: 100-button_led_cycle
description: Comprehensive test covering off-white-red-green-off-red-green-off
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 400, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 700, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1200, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1200, dev: "led0", v: { on: true, r: 255, g: 255, b: 255 } }

  - send: { op: "input", t: 2000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2050, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2050, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 3000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 3050, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 3050, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 3200, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 3250, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 3250, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 4000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 4300, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 4600, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 4900, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 5100, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 5100, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 6000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 6050, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 6050, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 7000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 7050, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 7050, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 7200, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 7250, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 7250, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 8000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 8300, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 8600, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 8900, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 9100, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 9100, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }
