name: button single/double click sticky states
firmware: 100-button_led_cycle
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 400, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 700, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1200, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1200, dev: "led0", v: { on: true, r: 255, g: 255, b: 255 } }

  - send: { op: "input", t: 1500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1560, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1560, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 1900, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1960, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1960, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 2300, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2360, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2360, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 2500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2560, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2560, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 3000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 3060, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 3060, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 3200, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 3260, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 3260, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }
