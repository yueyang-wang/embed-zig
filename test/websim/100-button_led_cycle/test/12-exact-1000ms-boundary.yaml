name: long press exact 1000ms boundary
firmware: 100-button_led_cycle
description: Test long press detection at exactly 1000ms boundary
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 0, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1000, dev: "led0", v: { on: true, r: 255, g: 255, b: 255 } }

  - send: { op: "input", t: 2000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 3000, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 3000, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 4000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 4999, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 4999, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 6000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 7000, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 7000, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }
