name: single click from green switches to red
firmware: 100-button_led_cycle
description: Verify single click always goes to red regardless of current mode including green
steps:
  - send: { op: "cmd", t: 0, dev: "sys", v: { cmd: "reset" } }
  - expect: { op: "set", t: 0, dev: "led0", v: { on: false, r: 0, g: 0, b: 0 } }

  - send: { op: "input", t: 100, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 150, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 150, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 300, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 350, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 350, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 1000, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1050, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1050, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }

  - send: { op: "input", t: 1500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1550, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1550, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
  - send: { op: "input", t: 1700, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 1750, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 1750, dev: "led0", v: { on: true, r: 0, g: 255, b: 0 } }

  - send: { op: "input", t: 2500, dev: "btn_boot", v: { action: "press_down" } }
  - send: { op: "input", t: 2550, dev: "btn_boot", v: { action: "release" } }
  - expect: { op: "set", t: 2550, dev: "led0", v: { on: true, r: 255, g: 0, b: 0 } }
