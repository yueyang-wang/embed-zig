<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>websim - button_led_cycle</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>WebSim: 100-button_led_cycle</h1>

      <section class="panel controls">
        <button id="btn-boot" class="boot-btn">BTN_BOOT</button>
        <button id="btn-reset" class="reset-btn">RESET</button>
      </section>

      <section class="panel led-panel">
        <div id="led0" class="led off" aria-label="LED0"></div>
        <div class="led-meta">
          <div><strong>state:</strong> <span id="led-state">off</span></div>
          <div><strong>rgb:</strong> <span id="led-rgb">0,0,0</span></div>
          <div><strong>t:</strong> <span id="led-t">0</span></div>
        </div>
      </section>

      <section class="panel logs">
        <h2>WS Traffic</h2>
        <pre id="logs"></pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
